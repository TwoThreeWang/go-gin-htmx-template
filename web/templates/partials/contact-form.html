{{if .Success}}
<div class="alert alert-success">
    <strong>Thank you{{if .Name}}, {{.Name}}{{end}}!</strong> {{.Success}}
</div>
{{end}}
{{if .Error}}
<div class="alert alert-error">{{.Error}}</div>
{{end}}

<form hx-post="/contact" hx-target="#contact-form-container" hx-swap="innerHTML" class="contact-form" id="contact-form-container">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Your name">
    </div>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com">
    </div>
    <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required rows="5" placeholder="Your message..."></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Send Message</button>
</form>
